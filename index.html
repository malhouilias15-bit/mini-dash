<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Dash</title>
<style>
html,body{margin:0;padding:0;background:#0b1020;color:white;font-family:Arial;overflow:hidden}
canvas{display:block;margin:auto}
button{background:#1c2744;color:white;border:1px solid #3af;padding:6px 10px;margin:4px;border-radius:6px;cursor:pointer}
#menu,#editorUI,#hud,#complete,#progressBox{position:absolute;left:0;right:0;text-align:center}
#menu{top:40px}
#editorUI{top:10px;left:10px;text-align:left}
#hud{top:10px}
#complete{top:200px;font-size:40px;display:none}
#progressBox{top:300px;display:none}
</style>
</head>
<body>

<div id="menu">
<h1>WELCOME TO MINI DASH</h1>
<div id="levels"></div>
<button onclick="document.getElementById('colorPicker').click()">Change Color</button>
<input type="color" id="colorPicker" style="display:none">
<button onclick="startEditor()">Level Editor</button>
</div>

<div id="editorUI" style="display:none">
<b>LEVEL EDITOR</b><br>
<button onclick="tool='block'">Block</button>
<button onclick="tool='spike'">Spike</button>
<button onclick="tool='pad'">Jump Pad</button>
<button onclick="tool='portalYellow'">Yellow Portal</button>
<button onclick="tool='portalGreen'">Green Portal</button>
<button onclick="tool='erase'">Erase</button><br><br>
<button onclick="playCustom()">Play Custom</button>
</div>

<div id="hud"></div>
<div id="complete">LEVEL COMPLETE!</div>
<div id="progressBox"></div>

<canvas id="game" width="1000" height="450"></canvas>


<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let mode="menu";
let scroll=0;
let speed=4;
let levelEnd=5000;
let completed=false;

let currentLevel=[];
let editorObjects=[];
let tool="block";

let winAnim=false;
let winRotation=0;

const player={
 x:150,
 y:300,
 v:0,
 size:26,
 grounded:false,
 ship:false,
 wave:false,
 ufo:false,
 canOrb:false,
 color:"#6cf"
};

/* ================= EDITOR UI ================= */

function startEditor(){
 mode="editor";
 scroll=0;
 editorObjects=[];
 document.getElementById("menu").style.display="none";
 document.getElementById("editorUI").style.display="block";
}

function playCustom(){
 mode="play";
 currentLevel=[...editorObjects];
 scroll=0;
 resetPlayer();
 document.getElementById("editorUI").style.display="none";
}

canvas.addEventListener("mousedown",e=>{
 if(mode!=="editor") return;

 const rect=canvas.getBoundingClientRect();
 const x=e.clientX-rect.left+scroll;
 const y=e.clientY-rect.top;

 editorObjects.push({
  x:x,
  y:y,
  w:40,
  h:40,
  type:tool
 });
});

/* ================= RESET ================= */

function resetPlayer(){
 player.y=300;
 player.v=0;
 player.ship=false;
 player.wave=false;
 player.ufo=false;
 player.grounded=false;
}

/* ================= INPUT ================= */

document.addEventListener("keydown",e=>{
 if(e.code==="Space" && mode==="play"){

  if(player.wave){
   player.v=-9;
  }

  else if(player.ship){
   player.v=-8;
  }

  else if(player.ufo){
   player.v=-12;
  }

  else if(player.grounded){
   player.v=-13;
   player.grounded=false;
  }

  else if(player.canOrb){
   player.v=-16;
   player.canOrb=false;
  }
 }
});

/* ================= COLLISION ================= */

function hit(o){
 return player.x < o.x - scroll + o.w &&
        player.x + player.size > o.x - scroll &&
        player.y < o.y + o.h &&
        player.y + player.size > o.y;
}

/* ================= DRAW PLAYER ================= */

function drawPlayer(){
 ctx.save();
 ctx.translate(player.x+13,player.y+13);

 if(winAnim){
  winRotation+=0.2;
  ctx.rotate(winRotation);
 } else {
  ctx.rotate(Math.PI/4);
 }

 ctx.fillStyle=player.color;
 ctx.fillRect(-13,-13,26,26);
 ctx.restore();
}

/* ================= UPDATE ================= */

function update(){

 ctx.fillStyle="#0b1020";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 // GREEN GROUND
 ctx.fillStyle="#00ff66";
 ctx.fillRect(0,360,canvas.width,90);

 if(mode==="play"){
  player.v += player.wave ? 0.5 : 0.7;
  player.y += player.v;
  scroll += speed;
 }

 if(player.y+player.size>360){
  player.y=360-player.size;
  player.v=0;
  player.grounded=true;
 }

 const objects = mode==="editor" ? editorObjects : currentLevel;

 objects.forEach(o=>{
  const dx=o.x-scroll;

  if(o.type==="block"){
   ctx.strokeStyle="#3af";
   ctx.strokeRect(dx,o.y,60,20);
  }

  if(o.type==="spike"){
   ctx.fillStyle="#9ff";
   ctx.beginPath();
   ctx.moveTo(dx,o.y+40);
   ctx.lineTo(dx+20,o.y);
   ctx.lineTo(dx+40,o.y+40);
   ctx.fill();
   if(mode==="play" && hit({x:o.x,y:o.y,w:40,h:40})) resetPlayer();
  }

  if(o.type==="orb"){
   ctx.fillStyle="#00ffff";
   ctx.beginPath();
   ctx.arc(dx+20,o.y+20,12,0,Math.PI*2);
   ctx.fill();
   if(mode==="play" && hit({x:o.x,y:o.y,w:40,h:40}))
     player.canOrb=true;
  }

  if(o.type==="shipPortal"){
   ctx.strokeStyle="#ff00cc";
   ctx.strokeRect(dx,o.y,40,80);
   if(mode==="play" && hit({x:o.x,y:o.y,w:40,h:80}))
     player.ship=true;
  }

  if(o.type==="wavePortal"){
   ctx.fillStyle="#ff55ff";
   ctx.fillRect(dx,o.y,40,80);
   if(mode==="play" && hit({x:o.x,y:o.y,w:40,h:80}))
     player.wave=true;
  }

  if(o.type==="ufoPortal"){
   ctx.fillStyle="#ffaa00";
   ctx.fillRect(dx,o.y,40,80);
   if(mode==="play" && hit({x:o.x,y:o.y,w:40,h:80}))
     player.ufo=true;
  }

  if(o.type==="endUfoPortal"){
   ctx.fillStyle="#ffff00";
   ctx.fillRect(dx,o.y,40,80);
   if(mode==="play" && hit({x:o.x,y:o.y,w:40,h:80}))
     player.ufo=false;
  }
 });

 if(mode==="play"){
  drawPlayer();
 }

 requestAnimationFrame(update);
}

update();
</script>
