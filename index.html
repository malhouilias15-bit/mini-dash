<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let mode="menu", levelIndex=0;
let scroll=0, speed=4, levelEnd=9000;
let completed=false;

let bestProgress=[0,0,0,0,0];
let winAnim=false;
let winRotation=0;
let waveMode=false;

const menu=document.getElementById("menu");
const hud=document.getElementById("hud");
const complete=document.getElementById("complete");

const player={
 x:150,
 y:300,
 v:0,
 size:26,
 grounded:false,
 ship:false,
 canOrb:false,
 color:"#6cf"
};

/* ================= COLOR ================= */

const colorPicker=document.getElementById("colorPicker");
colorPicker.value=player.color;
colorPicker.addEventListener("input",e=>{
 player.color=e.target.value;
});

/* ================= LEVELS ================= */

const levels=[
 {name:"Neon Warmup",data:[]},
 {name:"Pulse Runner",data:[]},
 {name:"Quantum Hop",data:[]},
 {name:"Chromatic Caverns",data:[]},
 {name:"Drift Zone",data:[]}
];

levels.forEach((l,i)=>{
 levelIndex=i;
 l.data=generateLevel();
});
levelIndex=0;

function generateLevel(){
 let arr=[],x=300;

 for(;x<levelEnd;x+=160){

  arr.push({x,y:360,w:140,h:20,type:"block"});

  // RANDOM SPIKES
  if(Math.random()<0.3)
    arr.push({x:x+60,y:330,w:40,h:30,type:"spike"});

  if(Math.random()<0.15){
    // double spike
    arr.push({x:x+40,y:330,w:40,h:30,type:"spike"});
    arr.push({x:x+80,y:330,w:40,h:30,type:"spike"});
  }

  if(Math.random()<0.08){
    // triple spike
    arr.push({x:x+30,y:330,w:40,h:30,type:"spike"});
    arr.push({x:x+70,y:330,w:40,h:30,type:"spike"});
    arr.push({x:x+110,y:330,w:40,h:30,type:"spike"});
  }

  if(Math.random()<0.3)
    arr.push({x:x+90,y:300,w:30,h:15,type:"pad"});

  if(Math.random()<0.25)
    arr.push({x:x+100,y:250,w:20,h:20,type:"orb"});
 }

 // portals
 arr.push({x:levelEnd*0.5,y:180,w:120,h:160,type:"portalYellow"});
 arr.push({x:levelEnd*0.7,y:180,w:120,h:160,type:"portalGreen"});

 // wave portal only in Drift Zone
 if(levelIndex===4){
   arr.push({
     x:levelEnd*0.6,
     y:200,
     w:100,
     h:120,
     type:"wavePortal"
   });
 }

 return arr;
}

/* ================= MENU ================= */

function addButtons(){
 const div=document.getElementById("levels");
 div.innerHTML="";
 levels.forEach((level,index)=>{
  const btn=document.createElement("button");
  btn.innerText=level.name;
  btn.onclick=()=>startLevel(index);
  div.appendChild(btn);
 });
}
addButtons();

function startLevel(i){
 levelIndex=i;
 mode="play";
 menu.style.display="none";
 complete.style.display="none";
 reset();
}

/* ================= RESET ================= */

function reset(){
 scroll=0;
 completed=false;
 winAnim=false;
 winRotation=0;
 waveMode=false;
 speed=4;

 player.y=300;
 player.v=0;
 player.ship=false;
 player.grounded=false;
}

/* ================= INPUT ================= */

document.addEventListener("keydown",e=>{
 if(e.code==="Space"&&mode==="play"){

  if(waveMode){
   player.v=-10;
  }

  else if(player.ship){
   player.v=-8;
  }

  else if(player.grounded){
   player.v=-13;
   player.grounded=false;
  }

  else if(player.canOrb){
   player.v=-16;
   player.canOrb=false;
  }
 }
});

/* ================= COLLISION ================= */

function hit(o){
 return player.x<o.x+o.w-scroll &&
        player.x+player.size>o.x-scroll &&
        player.y<o.y+o.h &&
        player.y+player.size>o.y;
}

/* ================= PLAYER ================= */

function drawPlayer(){
 ctx.save();
 ctx.translate(player.x+13,player.y+13);

 if(winAnim){
   winRotation+=0.2;
   ctx.rotate(winRotation);
   if(winRotation>=Math.PI*2){
     winAnim=false;
     complete.innerText="Level Complete!";
     complete.style.display="block";
     setTimeout(()=>{
       mode="menu";
       menu.style.display="block";
       complete.style.display="none";
       winRotation=0;
     },2000);
   }
 } else {
   ctx.rotate(Math.PI/4);
 }

 ctx.fillStyle=player.color;
 ctx.fillRect(-13,-13,26,26);
 ctx.restore();
}

/* ================= MAIN LOOP ================= */

function update(){

 ctx.fillStyle="#0b1020";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 // GREEN GROUND
 ctx.fillStyle="#00ff66";
 ctx.fillRect(0,360,canvas.width,90);

 if(mode==="play"&&!completed){
  player.v+= waveMode ? 0.5 : (player.ship?0.6:0.7);
  player.y+=player.v;
  scroll+=speed;
 }

 if(player.y+player.size>360){
  player.y=360-player.size;
  player.v=0;
  player.grounded=true;
 }

 levels[levelIndex].data.forEach(o=>{
  const dx=o.x-scroll;

  if(o.type==="block"){
   ctx.strokeStyle="#3af";
   ctx.strokeRect(dx,o.y,o.w,o.h);
   if(hit(o)&&player.v>=0){
    player.y=o.y-player.size;
    player.v=0;
    player.grounded=true;
   }
  }

  if(o.type==="spike"){
   ctx.fillStyle="#9ff";
   ctx.beginPath();
   ctx.moveTo(dx,o.y+o.h);
   ctx.lineTo(dx+o.w/2,o.y-10);
   ctx.lineTo(dx+o.w,o.y+o.h);
   ctx.fill();
   if(hit(o)) reset();
  }

  if(o.type==="pad"){
   ctx.fillStyle="yellow";
   ctx.fillRect(dx,o.y,o.w,o.h);
   if(hit(o)) player.v=-18;
  }

  if(o.type==="orb"){
   ctx.fillStyle="#00ffff";
   ctx.beginPath();
   ctx.arc(dx+10,o.y+10,10,0,Math.PI*2);
   ctx.fill();
   if(hit(o)){
     player.canOrb=true;
   }
  }

  if(o.type==="portalYellow"){
   ctx.strokeStyle="#ff00cc";
   ctx.strokeRect(dx,o.y,o.w,o.h);
   if(hit(o)){
     player.ship=true;
   }
  }

  if(o.type==="portalGreen"){
   ctx.strokeStyle="#00ffee";
   ctx.strokeRect(dx,o.y,o.w,o.w);
   if(hit(o)){
     player.ship=false;
   }
  }

  if(o.type==="wavePortal"){
   ctx.fillStyle="#ff55ff";
   ctx.fillRect(dx,o.y,o.w,o.h);
   if(hit(o)){
     waveMode=true;
     speed=6;
   }
  }
 });

 let percent=Math.min(100,Math.floor(scroll/levelEnd*100));
 hud.innerText=percent+"%";

 if(percent>bestProgress[levelIndex])
  bestProgress[levelIndex]=percent;

 if(scroll>=levelEnd&&!completed){
  completed=true;
  winAnim=true;
 }

 if(mode==="play") drawPlayer();

 requestAnimationFrame(update);
}

update();
</script>
