<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Dash</title>
<style>
html,body{margin:0;padding:0;background:#0b1020;color:white;font-family:Arial;overflow:hidden}
canvas{display:block;margin:auto}
button{background:#1c2744;color:white;border:1px solid #3af;padding:6px 10px;margin:4px;border-radius:6px;cursor:pointer}
#menu,#editorUI,#hud,#complete,#progressBox{position:absolute;left:0;right:0;text-align:center}
#menu{top:40px}
#editorUI{top:10px;left:10px;text-align:left}
#hud{top:10px}
#complete{top:200px;font-size:40px;display:none}
#progressBox{top:300px;display:none}
</style>
</head>
<body>

<div id="menu">
<h1>WELCOME TO MINI DASH</h1>
<div id="levels"></div>
<button onclick="document.getElementById('colorPicker').click()">Change Color</button>
<input type="color" id="colorPicker" style="display:none">
<button onclick="startEditor()">Level Editor</button>
</div>

<div id="editorUI" style="display:none">
<b>LEVEL EDITOR</b><br>
<button onclick="tool='block'">Block</button>
<button onclick="tool='spike'">Spike</button>
<button onclick="tool='pad'">Jump Pad</button>
<button onclick="tool='portalYellow'">Yellow Portal</button>
<button onclick="tool='portalGreen'">Green Portal</button>
<button onclick="tool='erase'">Erase</button><br><br>
<button onclick="playCustom()">Play Custom</button>
</div>

<div id="hud"></div>
<div id="complete">LEVEL COMPLETE!</div>
<div id="progressBox"></div>

<canvas id="game" width="1000" height="450"></canvas>


<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let mode="menu", levelIndex=0;
let scroll=0, speed=4, levelEnd=9000;
let completed=false;

let bestProgress=[0,0,0,0,0];

const menu=document.getElementById("menu");
const hud=document.getElementById("hud");
const complete=document.getElementById("complete");
const editorUI=document.getElementById("editorUI");

let tool="block";
let customLevel=[];

const player={
 x:150,
 y:300,
 v:0,
 size:26,
 grounded:false,
 ship:false,
 wave:false,
 orbReady:false,
 color:"#6cf"
};

/* ================= COLOR ================= */

const colorPicker=document.getElementById("colorPicker");
if(colorPicker){
 colorPicker.value=player.color;
 colorPicker.addEventListener("input",e=>{
  player.color=e.target.value;
 });
}

/* ================= LEVELS ================= */

const levels=[
 {name:"Neon Warmup",data:[]},
 {name:"Pulse Runner",data:[]},
 {name:"Quantum Hop",data:[]},
 {name:"Chromatic Caverns",data:[]},
 {name:"Drift Zone",data:[]}
];

levels.forEach((l,i)=>l.data=generateLevel());

function generateLevel(){
 let arr=[],x=300;

 const yellowX=levelEnd*0.5;
 const greenX=levelEnd*0.7;

 for(;x<levelEnd;x+=160){
  arr.push({x,y:360,w:140,h:20,type:"block"});

  if(Math.random()<0.35)
   arr.push({x:x+60,y:330,w:40,h:30,type:"spike"});

  if(Math.random()<0.2)
   arr.push({x:x+60,y:330,w:80,h:30,type:"doubleSpike"});

  if(Math.random()<0.1)
   arr.push({x:x+60,y:330,w:120,h:30,type:"tripleSpike"});

  if(Math.random()<0.5)
   arr.push({x:x+90,y:300,w:30,h:15,type:"pad"});

  if(Math.random()<0.3)
   arr.push({x:x+120,y:260,w:20,h:20,type:"orb"});
 }

 arr.push({x:yellowX,y:180,w:120,h:160,type:"portalYellow"});
 arr.push({x:greenX,y:180,w:120,h:160,type:"portalGreen"});
 arr.push({x:yellowX-500,y:180,w:120,h:160,type:"portalWave"});

 return arr;
}

/* ================= MENU ================= */

function addButtons(){
 const div=document.getElementById("levels");
 div.innerHTML="";
 levels.forEach((level,index)=>{
  const b=document.createElement("button");
  b.innerText=level.name;
  b.onclick=()=>startLevel(index);
  div.appendChild(b);
 });
}
addButtons();

function startLevel(i){
 levelIndex=i;
 mode="play";
 menu.style.display="none";
 editorUI.style.display="none";
 reset();
}

/* ================= EDITOR ================= */

function startEditor(){
 mode="editor";
 menu.style.display="none";
 editorUI.style.display="block";
 customLevel=[];
 scroll=0;
}

canvas.addEventListener("click",e=>{
 if(mode!=="editor") return;

 const rect=canvas.getBoundingClientRect();
 const x=e.clientX-rect.left+scroll;

 customLevel.push({x,y:330,w:40,h:30,type:tool});
});

function playCustom(){
 mode="custom";
 editorUI.style.display="none";
 reset();
}

/* ================= RESET ================= */

function reset(){
 scroll=0;
 completed=false;
 player.y=300;
 player.v=0;
 player.ship=false;
 player.wave=false;
 player.grounded=false;
}

/* ================= INPUT ================= */

document.addEventListener("keydown",e=>{
 if(e.code==="Space"){
  if(player.wave){
   player.v*=-1;
  }
  else if(player.ship){
   player.v=-8;
  }
  else if(player.orbReady){
   player.v=-18;
   player.orbReady=false;
  }
  else if(player.grounded){
   player.v=-13;
   player.grounded=false;
  }
 }
});

/* ================= DRAW ================= */

function drawRingPortal(x,y,color){
 ctx.save();
 ctx.translate(x+60,y+80);
 ctx.strokeStyle=color;
 ctx.lineWidth=16;
 ctx.beginPath();
 ctx.arc(0,0,55,0,Math.PI*2);
 ctx.stroke();
 ctx.restore();
}

function drawSpike(x,y,w){
 ctx.beginPath();
 ctx.moveTo(x,y+30);
 ctx.lineTo(x+w/2,y);
 ctx.lineTo(x+w,y+30);
 ctx.fill();
}

function drawPlayer(){
 ctx.save();
 ctx.translate(player.x+13,player.y+13);

 if(player.wave){
  ctx.rotate(player.v>0?0.5:-0.5);
 }else{
  ctx.rotate(Math.PI/4);
 }

 ctx.fillStyle=player.color;
 ctx.fillRect(-13,-13,26,26);
 ctx.restore();
}

function hit(o){
 return player.x<o.x+o.w-scroll &&
        player.x+player.size>o.x-scroll &&
        player.y<o.y+o.h &&
        player.y+player.size>o.y;
}

/* ================= MAIN LOOP ================= */

function update(){
 ctx.fillStyle="#0b1020";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 let objects = (mode==="custom")?customLevel:levels[levelIndex].data;

 if(mode==="play"||mode==="custom"){
  if(player.wave){
   player.y+=player.v;
  }else{
   player.v+=player.ship?0.6:0.7;
   player.y+=player.v;
  }
  scroll+=speed;
 }

 if(player.y+player.size>360){
  player.y=360-player.size;
  player.v=0;
  player.grounded=true;
 }

 objects.forEach(o=>{
  const dx=o.x-scroll;

  ctx.fillStyle="#9ff";

  if(o.type==="spike") drawSpike(dx,o.y,40);
  if(o.type==="doubleSpike"){
   drawSpike(dx,o.y,40);
   drawSpike(dx+40,o.y,40);
  }
  if(o.type==="tripleSpike"){
   drawSpike(dx,o.y,40);
   drawSpike(dx+40,o.y,40);
   drawSpike(dx+80,o.y,40);
  }

  if(o.type==="pad"){
   ctx.fillStyle="yellow";
   ctx.fillRect(dx,o.y,30,15);
  }

  if(o.type==="orb"){
   ctx.fillStyle="#ff66ff";
   ctx.beginPath();
   ctx.arc(dx+10,o.y+10,10,0,Math.PI*2);
   ctx.fill();
   if(hit(o)) player.orbReady=true;
  }

  if(o.type==="portalYellow"){
   drawRingPortal(dx,o.y,"#ff00cc");
   if(hit(o)){ player.ship=true; }
  }

  if(o.type==="portalGreen"){
   drawRingPortal(dx,o.y,"#00ffee");
   if(hit(o)){ player.ship=false; player.wave=false; }
  }

  if(o.type==="portalWave"){
   drawRingPortal(dx,o.y,"white");
   if(hit(o)){ player.wave=true; player.ship=false; player.v=4; }
  }

  if((o.type.includes("Spike")) && hit(o)) reset();
 });

 hud.innerText=Math.floor(scroll/levelEnd*100)+"%";

 if(mode==="play"||mode==="custom") drawPlayer();

 requestAnimationFrame(update);
}

update();
</script>
