<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Dash</title>
<style>
html,body{margin:0;padding:0;background:#0b1020;color:white;font-family:Arial;overflow:hidden}
canvas{display:block;margin:auto}
button{background:#1c2744;color:white;border:1px solid #3af;padding:6px 10px;margin:4px;border-radius:6px;cursor:pointer}
#menu,#editorUI,#hud,#complete{position:absolute;left:0;right:0;text-align:center}
#menu{top:40px}
#editorUI{top:10px}
#hud{top:10px}
#complete{top:200px;font-size:40px;display:none}
</style>
</head>
<body>

<div id="menu">
<h1>WELCOME TO MINI DASH</h1>
<div id="levels"></div>
<button onclick="startEditor()">Level Editor</button>
</div>

<div id="editorUI" style="display:none">
<b>LEVEL EDITOR</b><br>
<button onclick="tool='block'">Block</button>
<button onclick="tool='spike'">Spikes</button>
<button onclick="tool='orb'">Orb</button>
<button onclick="tool='portalYellow'">Rocket Ship</button>
<button onclick="tool='wavePortal'">Spam Wave</button>
<button onclick="tool='ufoPortal'">UFO</button>
<button onclick="tool='endUfoPortal'">End UFO</button>
<br><br>
<button onclick="playCustom()">Play Custom</button>
</div>

<div id="hud"></div>
<div id="complete">LEVEL COMPLETE!</div>

<canvas id="game" width="1000" height="450"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let mode="menu", levelIndex=0;
let scroll=0, speed=4, levelEnd=9000;
let completed=false;

let bestProgress=[0,0,0,0,0];
let winAnim=false;
let winRotation=0;
let waveMode=false;
let ufoMode=false;

let tool="block";
let customLevel=[];

const menu=document.getElementById("menu");
const hud=document.getElementById("hud");
const complete=document.getElementById("complete");

const player={
 x:150,
 y:300,
 v:0,
 size:26,
 grounded:false,
 ship:false,
 canOrb:false,
 color:"#6cf"
};

/* ================= LEVEL EDITOR ================= */

function startEditor(){
 mode="editor";
 menu.style.display="none";
 document.getElementById("editorUI").style.display="block";
 customLevel=[];
 scroll=0;
}

canvas.addEventListener("mousedown",e=>{
 if(mode!=="editor") return;

 const rect=canvas.getBoundingClientRect();
 const x=e.clientX-rect.left+scroll;
 const y=e.clientY-rect.top;

 customLevel.push({
  x:x,
  y:y,
  w:40,
  h:40,
  type:tool
 });
});

function playCustom(){
 mode="play";
 levelIndex=-1;
 scroll=0;
 completed=false;
 winAnim=false;
 ufoMode=false;
 waveMode=false;
 document.getElementById("editorUI").style.display="none";
 reset();
}

/* ================= RESET ================= */

function reset(){
 scroll=0;
 player.y=300;
 player.v=0;
 player.ship=false;
 player.grounded=false;
}

/* ================= INPUT ================= */

document.addEventListener("keydown",e=>{
 if(e.code==="Space"&&mode==="play"){

  if(waveMode){
   player.v=-10;
  }

  else if(player.ship){
   player.v=-8;
  }

  else if(ufoMode){
   player.v=-12;
  }

  else if(player.grounded){
   player.v=-13;
   player.grounded=false;
  }

  else if(player.canOrb){
   player.v=-16;
   player.canOrb=false;
  }
 }
});

/* ================= COLLISION ================= */

function hit(o){
 return player.x<o.x+o.w-scroll &&
        player.x+player.size>o.x-scroll &&
        player.y<o.y+o.h &&
        player.y+player.size>o.y;
}

/* ================= PLAYER ================= */

function drawPlayer(){
 ctx.save();
 ctx.translate(player.x+13,player.y+13);

 if(winAnim){
   winRotation+=0.2;
   ctx.rotate(winRotation);
 } else {
   ctx.rotate(Math.PI/4);
 }

 ctx.fillStyle=player.color;
 ctx.fillRect(-13,-13,26,26);
 ctx.restore();
}

/* ================= UPDATE ================= */

function update(){

 ctx.fillStyle="#0b1020";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 ctx.fillStyle="#00ff66";
 ctx.fillRect(0,360,canvas.width,90);

 if(mode==="play"&&!completed){
  player.v+= waveMode ? 0.5 : (player.ship?0.6:0.7);
  player.y+=player.v;
  scroll+=speed;
 }

 if(player.y+player.size>360){
  player.y=360-player.size;
  player.v=0;
  player.grounded=true;
 }

 const objects = levelIndex===-1 ? customLevel : [];

 objects.forEach(o=>{
  const dx=o.x-scroll;

  if(o.type==="block"){
   ctx.strokeStyle="#3af";
   ctx.strokeRect(dx,o.y,60,20);
  }

  if(o.type==="spike"){
   ctx.fillStyle="#9ff";
   ctx.beginPath();
   ctx.moveTo(dx,o.y+40);
   ctx.lineTo(dx+20,o.y);
   ctx.lineTo(dx+40,o.y+40);
   ctx.fill();
   if(mode==="play"&&hit(o)) reset();
  }

  if(o.type==="orb"){
   ctx.fillStyle="#00ffff";
   ctx.beginPath();
   ctx.arc(dx+20,o.y+20,12,0,Math.PI*2);
   ctx.fill();
   if(mode==="play"&&hit(o)) player.canOrb=true;
  }

  if(o.type==="portalYellow"){
   ctx.strokeStyle="#ff00cc";
   ctx.strokeRect(dx,o.y,40,80);
   if(mode==="play"&&hit(o)) player.ship=true;
  }

  if(o.type==="wavePortal"){
   ctx.fillStyle="#ff55ff";
   ctx.fillRect(dx,o.y,40,80);
   if(mode==="play"&&hit(o)){
     waveMode=true;
     speed=6;
   }
  }

  if(o.type==="ufoPortal"){
   ctx.fillStyle="#ffaa00";
   ctx.fillRect(dx,o.y,40,80);
   if(mode==="play"&&hit(o)) ufoMode=true;
  }

  if(o.type==="endUfoPortal"){
   ctx.fillStyle="#ffff00";
   ctx.fillRect(dx,o.y,40,80);
   if(mode==="play"&&hit(o)) ufoMode=false;
  }
 });

 if(mode==="play") drawPlayer();

 requestAnimationFrame(update);
}

update();
</script>
</body>
</html>
